<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VUNA Calculator — 3D Walkthrough</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<style>
  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:#06080b;
    color:#ece8e1;
    font-family:'IBM Plex Sans',sans-serif;
    overflow:hidden;
    width:100vw;height:100vh;
  }

  canvas, #label-renderer{
    position:fixed;inset:0;
    pointer-events:none;
  }
  #label-renderer{pointer-events:none;z-index:2;}
  #three-canvas{z-index:1;}

  /* ─── HUD overlay ─── */
  .hud{
    position:fixed;
    z-index:10;
    pointer-events:none;
  }

  .hud-top-left{
    top:clamp(1.2rem,3vh,2.4rem);
    left:clamp(1.2rem,4vw,3rem);
  }
  .hud-bottom-left{
    bottom:clamp(1.2rem,3vh,2rem);
    left:clamp(1.2rem,4vw,3rem);
  }
  .hud-bottom-right{
    bottom:clamp(1.2rem,3vh,2rem);
    right:clamp(1.2rem,4vw,3rem);
    text-align:right;
  }

  .hud .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:.7rem;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:rgba(127,229,212,.7);
    margin-bottom:.4rem;
  }
  .hud .title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:clamp(1.6rem,4vw,3rem);
    line-height:1.05;
    letter-spacing:-.02em;
  }
  .hud .title span{color:#ffb454;}
  .hud .sub{
    font-size:.8rem;
    color:rgba(236,232,225,.5);
    margin-top:.3rem;
    font-weight:300;
  }
  .hud .credit{
    font-family:'IBM Plex Mono',monospace;
    font-size:.6rem;
    color:rgba(126,135,156,.6);
    letter-spacing:.06em;
    margin-top:.4rem;
  }
  .hud .stats{
    display:flex;
    gap:1.2rem;
    font-family:'IBM Plex Mono',monospace;
    margin-top:.6rem;
  }
  .hud .stat-num{
    font-size:1rem;
    font-weight:600;
    color:#ffb454;
    display:block;
    line-height:1.2;
  }
  .hud .stat-label{
    font-size:.55rem;
    text-transform:uppercase;
    letter-spacing:.14em;
    color:rgba(126,135,156,.7);
  }

  .hud .hint{
    font-family:'IBM Plex Mono',monospace;
    font-size:.65rem;
    color:rgba(126,135,156,.6);
  }
  .hud .hint strong{color:#ffb454;font-weight:600;}
  .hud .text-link{
    color:rgba(127,229,212,.8);
    text-decoration:none;
    border-bottom:1px dashed;
    pointer-events:auto;
    transition:color .2s;
  }
  .hud .text-link:hover{color:#ffb454;}

  .pipeline-hud{
    position:fixed;
    bottom:clamp(3rem,6vh,4rem);
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    display:flex;
    gap:2.8rem;
    justify-content:center;
    pointer-events:none;
    padding:0 2rem;
    max-width:100vw;
    overflow-x:auto;
  }
  .pipeline-dot{
    display:flex;
    align-items:center;
    gap:.5rem;
    flex-shrink:0;
  }
  .pipeline-dot::before{
    content:'';
    width:7px;height:7px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.02);
    transition:all .5s ease;
    flex-shrink:0;
  }
  .pipeline-dot.active::before{
    background:rgba(127,229,212,.8);
    box-shadow:0 0 10px rgba(127,229,212,.35);
    border-color:rgba(127,229,212,.6);
    transform:scale(1.25);
  }
  .pipeline-dot .dot-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:.5rem;
    color:rgba(126,135,156,.4);
    white-space:nowrap;
    transition:color .5s;
    letter-spacing:.06em;
  }
  .pipeline-dot.active .dot-label{color:rgba(127,229,212,.75);}

  @media (max-width:720px){
    .pipeline-hud{gap:1.8rem;padding:0 1rem;}
    .pipeline-dot .dot-label{font-size:.45rem;}
    .hud .stats{gap:.7rem;}
  }
  @media (max-width:500px){
    .pipeline-hud{display:none;}
    .hud-bottom-right{display:none;}
  }

  @media (pointer:coarse){
    .pipeline-hud{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  }

  /* ─── Loading ─── */
  #loading{
    position:fixed;inset:0;z-index:99;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:#06080b;
    transition:opacity 1s ease;
  }
  #loading.hidden{opacity:0;pointer-events:none;}
  #loading .bar-wrap{
    width:160px;height:2px;
    background:rgba(255,255,255,.05);
    border-radius:2px;overflow:hidden;
    margin-top:1.2rem;
  }
  #loading .bar-fill{
    width:0%;height:100%;
    background:linear-gradient(90deg,#ffb454,#7fe5d4);
    border-radius:2px;
    transition:width .3s;
  }
  #loading .ld-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:.7rem;
    color:rgba(126,135,156,.6);
    letter-spacing:.15em;
    margin-top:1rem;
  }

</style>
</head>
<body>

<div id="loading">
  <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.4rem;letter-spacing:-.02em;">VUNA <span style="color:#ffb454;">3D</span></div>
  <div class="bar-wrap"><div class="bar-fill" id="loadFill"></div></div>
  <div class="ld-label" id="loadLabel">initialising scene</div>
</div>

<canvas id="three-canvas"></canvas>
<div id="label-renderer"></div>

<div class="hud hud-top-left">
  <p class="eyebrow">sen 482 · ci/cd pipeline lab</p>
  <h1 class="title">VUNA <span>CALCULATOR</span></h1>
  <p class="sub">four functions · six pipeline stages · 3D walkthrough</p>
  <div class="stats">
    <div><span class="stat-num" id="statOps">0</span><span class="stat-label">ops / min</span></div>
    <div><span class="stat-num" id="statUptime">0%</span><span class="stat-label">uptime</span></div>
    <div><span class="stat-num" id="statLatency">0ms</span><span class="stat-label">latency</span></div>
  </div>
</div>

<div class="hud hud-bottom-left">
  <p class="credit">Osadolor Benedict O.</p>
  <p class="hint"><strong>drag</strong> to orbit · <strong>scroll</strong> to zoom ·<br><a class="text-link" href="/calculator/">open calculator →</a></p>
</div>

<div class="hud hud-bottom-right">
  <div style="display:inline-block;text-align:right;">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:rgba(126,135,156,.5);letter-spacing:.1em;">click the <strong style="color:#ffb454;">=</strong> key to launch</div>
  </div>
</div>

<div class="pipeline-hud" id="pipelineHud"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ─── Loading progress ──────────────────────────────────────────────────────
const loadFill = document.getElementById('loadFill');
const loadLabel = document.getElementById('loadLabel');
let loadProgress = 0;
function updateLoad(msg, pct){
  loadLabel.textContent = msg;
  loadFill.style.width = Math.min(pct, 100) + '%';
  loadProgress = pct;
}
updateLoad('initialising scene', 5);

// ─── Scene setup ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06080b, 0.006);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(6, 4, 9);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById('three-canvas'),
  antialias: true,
  alpha: false,
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'fixed';
labelRenderer.domElement.style.inset = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
labelRenderer.domElement.style.zIndex = '2';
document.getElementById('label-renderer').appendChild(labelRenderer.domElement);

updateLoad('building environment', 12);

// ─── Controls ──────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.2;
controls.minDistance = 3;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI / 2.1;
controls.target.set(0, 0.8, 0);
controls.update();

renderer.domElement.style.pointerEvents = 'auto';

// ─── Lights ────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x222244, 0.4);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xffe8c8, 1.8);
keyLight.position.set(5, 12, 8);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024;
keyLight.shadow.mapSize.height = 1024;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -10;
keyLight.shadow.camera.right = 10;
keyLight.shadow.camera.top = 10;
keyLight.shadow.camera.bottom = -10;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x4488ff, 0.5);
fillLight.position.set(-4, 3, -6);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x7fe5d4, 0.6);
rimLight.position.set(-2, 1, 8);
scene.add(rimLight);

const ambientGlow = new THREE.PointLight(0xffb454, 0.3, 10);
ambientGlow.position.set(0, 1, 0);
scene.add(ambientGlow);

updateLoad('lighting scene', 20);

// ─── Grid floor ────────────────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(30, 40, 0x7fe5d4, 0x7fe5d4);
gridHelper.material.transparent = true;
gridHelper.material.opacity = 0.08;
scene.add(gridHelper);

const gridHelper2 = new THREE.GridHelper(30, 10, 0xffb454, 0xffb454);
gridHelper2.material.transparent = true;
gridHelper2.material.opacity = 0.03;
gridHelper2.position.y = -0.01;
scene.add(gridHelper2);

// Ground plane (receives shadows)
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.ShadowMaterial({
  opacity: 0.25,
  color: 0x000000,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

updateLoad('building calculator', 30);

// ─── Calculator 3D model ──────────────────────────────────────────────────
const calcGroup = new THREE.Group();
calcGroup.position.y = 1.4;
calcGroup.castShadow = true;

// Body
const bodyMat = new THREE.MeshStandardMaterial({
  color: 0x1d2330,
  roughness: 0.3,
  metalness: 0.6,
});
const bodyGeo = new THREE.BoxGeometry(3.6, 5.2, 0.44);
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.castShadow = true;
body.receiveShadow = true;
body.position.z = 0;
calcGroup.add(body);

// Edge glows
const edgeMat = new THREE.MeshStandardMaterial({
  color: 0x0a0e18,
  roughness: 0.5,
  metalness: 0.8,
});
const edgeGeo = new THREE.BoxGeometry(3.7, 5.3, 0.04);
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.z = -0.24;
calcGroup.add(edge);

// Front glass overlay
const glassMat = new THREE.MeshStandardMaterial({
  color: 0x1a2030,
  roughness: 0.1,
  metalness: 0.3,
  transparent: true,
  opacity: 0.15,
  envMapIntensity: 0.5,
});
const glassGeo = new THREE.BoxGeometry(3.3, 4.9, 0.01);
const glass = new THREE.Mesh(glassGeo, glassMat);
glass.position.z = 0.23;
calcGroup.add(glass);

// Display area
const displayMat = new THREE.MeshStandardMaterial({
  color: 0x06080b,
  roughness: 0.8,
  metalness: 0.1,
});
const displayGeo = new THREE.BoxGeometry(2.8, 0.65, 0.02);
const displayMesh = new THREE.Mesh(displayGeo, displayMat);
displayMesh.position.set(0, 2.0, 0.24);
calcGroup.add(displayMesh);

// Display glow strip
const dispGlowMat = new THREE.MeshBasicMaterial({
  color: 0xffb454,
  transparent: true,
  opacity: 0.08,
});
const dispGlowGeo = new THREE.BoxGeometry(2.6, 0.45, 0.01);
const dispGlow = new THREE.Mesh(dispGlowGeo, dispGlowMat);
dispGlow.position.set(0, 2.0, 0.26);
calcGroup.add(dispGlow);

// Keys
const keyMat = new THREE.MeshStandardMaterial({
  color: 0x262e3f,
  roughness: 0.5,
  metalness: 0.3,
});
const keyMatOp = new THREE.MeshStandardMaterial({
  color: 0x2a4a55,
  roughness: 0.4,
  metalness: 0.3,
  emissive: 0x7fe5d4,
  emissiveIntensity: 0.03,
});
const keyMatEq = new THREE.MeshStandardMaterial({
  color: 0xffb454,
  roughness: 0.3,
  metalness: 0.2,
  emissive: 0xffb454,
  emissiveIntensity: 0.15,
});

const keyW = 0.5, keyH = 0.5, keyD = 0.1;
const gapX = 0.14, gapY = 0.14;
const stepX = keyW + gapX;
const stepY = keyH + gapY;
const startX = -3 * stepX / 2;
const startY = 2 * stepY;
const opIdx = [3, 7, 11];

// Equals key — col 3, spans rows 3-4
const eqKey = new THREE.Mesh(new THREE.BoxGeometry(keyW, keyH * 2 + gapY, keyD), keyMatEq);
eqKey.position.set(startX + 3 * stepX, startY - 3.5 * stepY, 0.24);
eqKey.castShadow = true;
eqKey.userData.clickable = true;
calcGroup.add(eqKey);

// Regular keys (0-14, excluding 15 which is =)
for (let i = 0; i < 15; i++) {
  const col = i % 4;
  const row = Math.floor(i / 4);
  let mat = keyMat;
  if (opIdx.includes(i)) mat = keyMatOp;

  const geo = new THREE.BoxGeometry(keyW, keyH, keyD);
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(startX + col * stepX, startY - row * stepY, 0.24);
  mesh.castShadow = true;
  calcGroup.add(mesh);
}

// "0" key — row 4, spans cols 0-1
const zeroKey = new THREE.Mesh(new THREE.BoxGeometry(keyW * 2 + gapX, keyH, keyD), keyMat);
zeroKey.position.set(startX + stepX / 2, startY - 4 * stepY, 0.24);
zeroKey.castShadow = true;
calcGroup.add(zeroKey);

// "." key — row 4, col 2
const dotKey = new THREE.Mesh(new THREE.BoxGeometry(keyW, keyH, keyD), keyMat);
dotKey.position.set(startX + 2 * stepX, startY - 4 * stepY, 0.24);
dotKey.castShadow = true;
calcGroup.add(dotKey);

// Amber accent line on the side
const accentMat = new THREE.MeshBasicMaterial({
  color: 0xffb454,
  transparent: true,
  opacity: 0.15,
});
const accentGeo = new THREE.BoxGeometry(0.04, 5.0, 0.02);
const accent = new THREE.Mesh(accentGeo, accentMat);
accent.position.set(1.79, 0, 0.1);
calcGroup.add(accent);

scene.add(calcGroup);
updateLoad('creating pipeline orbs', 50);

// ─── Pipeline orbiting stages ─────────────────────────────────────────────
const stageNames = ['Build', 'Test', 'Lint', 'Image', 'Push', 'Deploy'];
const stageColors = [0xff6b6b, 0xffb454, 0x7fe5d4, 0x4ecdc4, 0x45b7d1, 0xa29bfe];
const stageOrbits = [];
const orbitRadius = 3.8;
const orbitGroup = new THREE.Group();
scene.add(orbitGroup);

// Pipeline HUD dots
const pipelineHud = document.getElementById('pipelineHud');
stageNames.forEach((name, i) => {
  const dot = document.createElement('div');
  dot.className = 'pipeline-dot';
  dot.innerHTML = `<span class="dot-label">${String(i+1).padStart(2, '0')} ${name}</span>`;
  pipelineHud.appendChild(dot);
});

// Orbiting spheres
stageNames.forEach((name, i) => {
  const angle = (i / stageNames.length) * Math.PI * 2;
  const col = stageColors[i];
  const colObj = new THREE.Color(col);

  // Sphere
  const sphereMat = new THREE.MeshStandardMaterial({
    color: col,
    emissive: col,
    emissiveIntensity: 0.2,
    roughness: 0.2,
    metalness: 0.5,
    transparent: true,
    opacity: 0.8,
  });
  const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), sphereMat);
  sphere.position.set(
    Math.cos(angle) * orbitRadius,
    0.4 + Math.sin(angle * 2) * 0.15,
    Math.sin(angle) * orbitRadius
  );
  sphere.castShadow = true;
  orbitGroup.add(sphere);
  stageOrbits.push({ mesh: sphere, angle: angle, name: name, color: col });

  // Orbit ring
  const ringMat = new THREE.MeshBasicMaterial({
    color: col,
    transparent: true,
    opacity: 0.04,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(new THREE.RingGeometry(orbitRadius - 0.02, orbitRadius + 0.02, 64), ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.position.y = 0;
  orbitGroup.add(ring);

  // Connection line to center
  const lineMat = new THREE.LineBasicMaterial({
    color: col,
    transparent: true,
    opacity: 0.06,
  });
  const pts = [
    new THREE.Vector3(0, 0, 0),
    sphere.position.clone(),
  ];
  const lineGeo = new THREE.BufferGeometry().setFromPoints(pts);
  const line = new THREE.Line(lineGeo, lineMat);
  orbitGroup.add(line);
  sphere.userData.line = line;

  // CSS2D label
  const labelDiv = document.createElement('div');
  labelDiv.textContent = name;
  labelDiv.style.color = '#7fe5d4';
  labelDiv.style.fontFamily = "'IBM Plex Mono',monospace";
  labelDiv.style.fontSize = '10px';
  labelDiv.style.fontWeight = '500';
  labelDiv.style.letterSpacing = '0.12em';
  labelDiv.style.textTransform = 'uppercase';
  labelDiv.style.textShadow = '0 0 20px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.6)';
  labelDiv.style.background = 'rgba(6,8,11,0.6)';
  labelDiv.style.padding = '2px 8px';
  labelDiv.style.borderRadius = '4px';
  labelDiv.style.border = '1px solid ' + new THREE.Color(col).getStyle();
  labelDiv.style.backdropFilter = 'blur(4px)';
  labelDiv.style.pointerEvents = 'none';

  const label = new CSS2DObject(labelDiv);
  label.position.copy(sphere.position);
  label.position.y += 0.5;
  orbitGroup.add(label);
  sphere.userData.label = label;
});

updateLoad('scattering particles', 65);

// ─── Particles ────────────────────────────────────────────────────────────
const particleCount = 3000;
const particleGeo = new THREE.BufferGeometry();
const pPositions = new Float32Array(particleCount * 3);
const pSizes = new Float32Array(particleCount);
const pColors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  const radius = 5 + Math.random() * 55;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos((Math.random() * 2) - 1);

  pPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
  pPositions[i*3+1] = (Math.random() - 0.5) * 20;
  pPositions[i*3+2] = radius * Math.cos(phi);

  pSizes[i] = 0.1 + Math.random() * 0.4;

  const c = new THREE.Color();
  if (Math.random() < 0.15) c.setHSL(0.08, 0.7, 0.5 + Math.random() * 0.3);
  else if (Math.random() < 0.15) c.setHSL(0.55, 0.5, 0.4 + Math.random() * 0.3);
  else c.setHSL(0, 0, 0.3 + Math.random() * 0.4);
  pColors[i*3] = c.r; pColors[i*3+1] = c.g; pColors[i*3+2] = c.b;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));
particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.12,
  vertexColors: true,
  transparent: true,
  opacity: 0.8,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
  depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

updateLoad('applying post-processing', 75);

// ─── Post-processing bloom ────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

let bloomPass;
try {
  bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.25,
    0.4,
    0.1
  );
  composer.addPass(bloomPass);
} catch (e) {
  console.warn('Bloom not available, continuing without');
}

updateLoad('finalising', 88);

// ─── Raycaster for interaction ────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let hoveredKey = null;

renderer.domElement.addEventListener('click', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const intersects = raycaster.intersectObjects(calcGroup.children, true);
  if (intersects.length > 0) {
    let obj = intersects[0].object;
    while (obj.parent && obj !== calcGroup) obj = obj.parent;
    if (obj.userData && obj.userData.clickable) {
      window.location.href = '/calculator/';
    } else if (obj.material && obj.material.color) {
      const c = obj.material.color.getHex();
      if (c === 0xffb454 || c === 0x262e3f) {
        window.location.href = '/calculator/';
      }
    }
  }
});

renderer.domElement.addEventListener('mousemove', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
});

updateLoad('ready', 100);
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 400);

// ─── Resize ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  const w = window.innerWidth;
  const h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  labelRenderer.setSize(w, h);
  composer.setSize(w, h);
});

// ─── Stats ticker ─────────────────────────────────────────────────────────
let ops = 1337, uptime = 99.94, lat = 12;
setInterval(() => {
  ops += Math.floor(Math.random() * 5);
  document.getElementById('statOps').textContent = ops.toLocaleString();
  const u = uptime + (Math.random() - 0.5) * 0.06;
  document.getElementById('statUptime').textContent = u.toFixed(2) + '%';
  let l = lat + Math.floor((Math.random() - 0.5) * 4);
  if (l < 2) l = 2; if (l > 30) l = 30;
  document.getElementById('statLatency').textContent = l + 'ms';
}, 2000);

// ─── Pipeline HUD cycle ───────────────────────────────────────────────────
const dots = document.querySelectorAll('.pipeline-dot');
let di = 0;
function cycleDots(){
  dots.forEach((d, idx) => d.classList.toggle('active', idx <= di));
  di = (di + 1) % (dots.length + 1);
  if (di === 0) setTimeout(() => dots.forEach(d => d.classList.remove('active')), 500);
}
cycleDots();
setInterval(cycleDots, 650);

// ─── Animation loop ───────────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);

  // Rotate orbit group
  orbitGroup.rotation.y += 0.004;

  // Update individual orb positions with slight vertical bounce
  stageOrbits.forEach((orb) => {
    const angle = orb.angle + orbitGroup.rotation.y;
    orb.mesh.position.x = Math.cos(angle) * orbitRadius;
    orb.mesh.position.z = Math.sin(angle) * orbitRadius;
    orb.mesh.position.y = 0.4 + Math.sin(Date.now() * 0.001 + orb.angle * 3) * 0.15;

    // Update connection line
    const pos = orb.mesh.position;
    const line = orb.mesh.userData.line;
    if (line) {
      const positions = line.geometry.attributes.position.array;
      positions[3] = pos.x; positions[4] = pos.y; positions[5] = pos.z;
      line.geometry.attributes.position.needsUpdate = true;
    }

    // Update label position
    const label = orb.mesh.userData.label;
    if (label) {
      label.position.copy(pos);
      label.position.y += 0.5;
    }
  });

  // Pulse display glow
  if (dispGlow) {
    dispGlow.material.opacity = 0.05 + Math.sin(Date.now() * 0.003) * 0.03;
  }

  // Slowly rotate particles
  particles.rotation.y += 0.0002;

  // Hover detection for = key glow
  const rect = renderer.domElement.getBoundingClientRect();
  pointer.x = ((pointer.x || 0) + 1) / 2;
  // Reset

  controls.update();

  // Render via composer
  try {
    composer.render();
  } catch (e) {
    renderer.render(scene, camera);
  }

  // CSS2D render
  labelRenderer.render(scene, camera);
}
animate();

// ─── Fade-in animation for HUD ────────────────────────────────────────────
document.querySelectorAll('.hud > *, .pipeline-hud').forEach((el, i) => {
  el.style.opacity = '0';
  el.style.transform = 'translateY(12px)';
  el.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
  setTimeout(() => {
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  }, 600 + i * 150);
});
</script>
